# Stage 2 only: causal LM learns dialog line after "Chosen need/action" + SAY:
# Train with: python scripts/train_say_sft.py --config configs/two_stage.yaml ...

model_name: "distilgpt2"
max_length: 512
max_new_tokens: 48

classifier:
  char_ngram_range: [2, 5]
  max_features: 8000
  max_iter: 400
  solver: "lbfgs"

train:
  output_dir: "models/aipet-say"
  num_train_epochs: 10
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.08
  logging_steps: 5
  evaluation_strategy: "steps"
  eval_steps: 50
  save_strategy: "steps"
  save_steps: 50
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  fp16: false
  bf16: false

infer:
  do_sample: false
  num_beams: 1
